name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should_release: ${{ steps.check-release.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.get-version.outputs.version }}" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release v${{ steps.get-version.outputs.version }} already exists, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release found for v${{ steps.get-version.outputs.version }}, will build and release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles deb,rpm"
            rust-target: x86_64-unknown-linux-gnu
            binary-name: elysium-crafting-helper
            archive-ext: .tar.gz
          - platform: windows-latest
            args: "--bundles nsis"
            rust-target: x86_64-pc-windows-msvc
            binary-name: elysium-crafting-helper.exe
            archive-ext: .zip
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.check-version.outputs.version }}
          releaseName: v${{ needs.check-version.outputs.version }}
          releaseBody: "Release v${{ needs.check-version.outputs.version }}"
          releaseDraft: false
          prerelease: false
          tauriScript: bun tauri
          args: ${{ matrix.args }}

      - name: Package binary for cargo-binstall (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          ARCHIVE_NAME="elysium-crafting-helper-${{ matrix.rust-target }}.tar.gz"
          cp "src-tauri/target/release/${{ matrix.binary-name }}" "${{ matrix.binary-name }}"
          cp "src-tauri/icons/128x128.png" "elysium-crafting-helper.png"
          tar czf "$ARCHIVE_NAME" "${{ matrix.binary-name }}" "elysium-crafting-helper.png"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Package binary for cargo-binstall (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $archiveName = "elysium-crafting-helper-${{ matrix.rust-target }}.zip"
          Copy-Item "src-tauri/target/release/${{ matrix.binary-name }}" "${{ matrix.binary-name }}"
          Compress-Archive -Path "${{ matrix.binary-name }}" -DestinationPath "$archiveName"
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV

      - name: Upload binary archive to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.check-version.outputs.version }}" "${{ env.ARCHIVE_NAME }}" --repo "${{ github.repository }}" --clobber

  publish-crate:
    needs: [check-version, build-and-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from package.json into Cargo.toml
        run: |
          VERSION=$(jq -r .version package.json)
          sed -i "s/^version = \"0.0.0\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty
        working-directory: src-tauri

  publish-aur:
    needs: [check-version, build-and-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PKGBUILD
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          ARCHIVE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/elysium-crafting-helper-x86_64-unknown-linux-gnu.tar.gz"
          SHA256=$(curl -sL "$ARCHIVE_URL" | sha256sum | cut -d' ' -f1)
          sed -e "s/{{VERSION}}/${VERSION}/g" -e "s/{{SHA256}}/${SHA256}/g" .github/aur/PKGBUILD.template > PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: elysium-crafting-helper-bin
          pkgbuild: ./PKGBUILD
          commit_username: Brodino96
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  publish-winget:
    needs: [check-version, build-and-release]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Publish to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Brodino.ElysiumCraftingHelper
          version: ${{ needs.check-version.outputs.version }}
          installers-regex: 'x64-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
