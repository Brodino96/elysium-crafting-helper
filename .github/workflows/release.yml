name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version to Tauri files
        run: node scripts/prepare_release.js

      - name: Update Cargo.lock
        working-directory: src-tauri
        run: cargo generate-lockfile

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Commit version sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "Version already in sync, nothing to commit"
          else
            git commit -m "chore: sync version to v${{ steps.version.outputs.version }}"
            git push
          fi

      - name: Create tag
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag $VERSION already exists. Update the version in package.json first."
            exit 1
          fi
          git tag "$VERSION"
          git push origin "$VERSION"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            bundles: deb,rpm,appimage
            artifact: linux-x86_64
          - os: windows-latest
            bundles: nsis,msi
            artifact: windows-x86_64
          - os: macos-latest # arm64
            bundles: dmg,app
            artifact: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: bun install

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        run: bun run tauri build --bundles ${{ matrix.bundles }}

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: |
          cd src-tauri/target/release/bundle/macos
          for app in *.app; do
            ditto -c -k --sequesterRsrc "$app" "${app%.app}.app.zip"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bundles-${{ matrix.artifact }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.zip
          if-no-files-found: ignore

  build-portable-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: v${{ needs.prepare.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install --locked cargo-xwin

      - name: Install frontend dependencies
        run: bun install

      - name: Build portable executable
        run: bun run tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles none

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: bundles-windows-portable
          path: src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
          if-no-files-found: error

  release:
    needs: [prepare, build, build-portable-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          find artifacts -type f \( \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.app.zip" \
          \) | while read -r file; do
            echo "Uploading: $file"
            gh release upload "v${VERSION}" "$file" --repo "${{ github.repository }}"
          done

          find artifacts/bundles-windows-x86_64 -type f -name "*.exe" | while read -r file; do
            echo "Uploading installer: $file"
            gh release upload "v${VERSION}" "$file" --repo "${{ github.repository }}"
          done

          find artifacts/bundles-windows-portable -type f -name "*.exe" | while read -r file; do
            filename=$(basename "$file")
            name="${filename%.exe}"
            portable_name="${name}_portable.exe"
            cp "$file" "$(dirname "$file")/$portable_name"
            echo "Uploading portable: $portable_name"
            gh release upload "v${VERSION}" "$(dirname "$file")/$portable_name" --repo "${{ github.repository }}"
          done